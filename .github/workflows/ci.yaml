name: Lint and Format

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Ruff Check (Linter)
        uses: astral-sh/ruff-action@v3
        with:
          args: "check"

      - name: Run Ruff Format (Formatter)
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"